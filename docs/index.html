<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alittle</title>
  <!-- 引入 Tailwind CSS CDN（仅用于基础布局和字体，无复杂样式） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 自定义简单动画和质感细节 -->
  <style>
    /* 核心入场动画：淡入+轻微上浮 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    /* 艺术字质感：深灰渐变+极淡阴影（不破坏白底黑字主基调） */
    .alittle-logo {
      background: linear-gradient(to right, #1f2937, #000000);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="bg-white text-black min-h-screen font-sans antialiased">
  <!-- 主内容区：垂直水平居中 -->
  <main class="flex-1 flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <!-- 1. 粗体艺术字 Alittle（入场动画0s） -->
    <h1 class="alittle-logo animate-fade-in-up font-extrabold text-6xl sm:text-8xl lg:text-9xl tracking-tight mb-6">
      Alittle
    </h1>

    <!-- 2. 欢迎语（入场动画延迟0.3s） -->
    <p class="animate-fade-in-up text-lg sm:text-xl lg:text-2xl text-gray-700 mb-16" style="animation-delay: 0.3s;">
      Thanks for choosing Alittle
    </p>

    <!-- 3. Product 栏（入场动画延迟0.6s） -->
    <section class="animate-fade-in-up w-full max-w-md" style="animation-delay: 0.6s;">
      <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-center">
        Product
      </h2>

      <!-- 下载项列表（带简单悬停动画） -->
      <div class="space-y-4">
        <!-- 下载项1：MSI 安装包（入场动画延迟0.9s） -->
        <a 
          href="alittle-browser.msi" 
          download
          class="animate-fade-in-up block w-full px-6 py-4 border border-gray-200 rounded-lg transition-all duration-300 ease-in-out hover:border-gray-400 hover:translate-y-[-2px] hover:shadow-sm"
          style="animation-delay: 0.9s;"
        >
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold text-lg">Alittle 浏览器</div>
              <div class="text-sm text-gray-500">MSI 标准安装包</div>
            </div>
            <svg class="w-6 h-6 text-gray-400 hover:text-black transition-colors" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </a>

        <!-- 下载项2：EXE 便携版（入场动画延迟1.2s） -->
        <a 
          href="app.exe" 
          download
          class="animate-fade-in-up block w-full px-6 py-4 border border-gray-200 rounded-lg transition-all duration-300 ease-in-out hover:border-gray-400 hover:translate-y-[-2px] hover:shadow-sm"
          style="animation-delay: 1.2s;"
        >
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold text-lg">Alittle 浏览器</div>
              <div class="text-sm text-gray-500">EXE 便携可执行文件</div>
            </div>
            <svg class="w-6 h-6 text-gray-400 hover:text-black transition-colors" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </a>
      </div>
    </section>
  </main>

  <!-- 极简页脚 -->
  <footer class="py-6 text-center text-sm text-gray-400">
    <p>© 2026 Alittle. All rights reserved.</p>
  </footer>
</body>
</html>
