<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alittle - 轻量多标签浏览器</title>
  <!-- 引入 Tailwind CSS CDN，无需本地配置 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 自定义样式与动画 -->
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen font-sans text-slate-800">
  <!-- 顶部导航栏 -->
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <!-- 品牌 Logo -->
      <div class="flex items-center gap-2">
        <svg class="w-8 h-8 text-blue-600" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="4" width="18" height="16" rx="3" fill="currentColor" opacity="0.1"/>
          <rect x="3" y="4" width="18" height="5" rx="3" fill="currentColor"/>
          <circle cx="6" cy="6.5" r="1" fill="white"/>
          <circle cx="9" cy="6.5" r="1" fill="white"/>
          <circle cx="12" cy="6.5" r="1" fill="white"/>
          <rect x="6" y="11" width="12" height="2" rx="1" fill="currentColor" opacity="0.3"/>
          <rect x="6" y="15" width="8" height="2" rx="1" fill="currentColor" opacity="0.2"/>
        </svg>
        <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Alittle</span>
      </div>
      <!-- GitHub 链接（可选） -->
      <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 hover:bg-slate-200 transition-colors text-sm font-medium">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        查看源码
      </a>
    </div>
  </header>

  <!-- 主视觉区域 -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <!-- 左侧文字介绍 -->
      <div class="text-center lg:text-left">
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold leading-tight mb-6">
          <span class="bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Alittle</span>
          <br class="hidden sm:block">
          轻量多标签浏览器
        </h1>
        <p class="text-lg sm:text-xl text-slate-600 mb-10 max-w-lg mx-auto lg:mx-0">
          基于 Tauri v1 构建，体积小、启动快、内存占用低，支持多标签页、前进后退导航，是你的轻量浏览好帮手。
        </p>
        <!-- 下载按钮区域（包含 MSI 安装版 + EXE 便携版） -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
          <!-- MSI 推荐安装包 -->
          <a href="app.msi" download class="group flex items-center justify-center gap-3 px-8 py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-lg hover:shadow-xl transition-all duration-300 text-white font-semibold text-lg">
            <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="text-left">
              <div>下载 MSI 安装包</div>
              <div class="text-xs opacity-80">推荐 · 标准 Windows 安装</div>
            </div>
          </a>
          <!-- EXE 便携版 -->
          <a href="app.exe" download class="group flex items-center justify-center gap-3 px-8 py-4 rounded-2xl bg-white border-2 border-slate-200 hover:border-blue-300 hover:bg-blue-50 shadow-md hover:shadow-lg transition-all duration-300 text-slate-700 font-semibold text-lg">
            <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="text-left">
              <div>下载 EXE 便携版</div>
              <div class="text-xs opacity-80">无需安装 · 双击即用</div>
            </div>
          </a>
        </div>
      </div>
      <!-- 右侧浏览器图标（带动画） -->
      <div class="flex justify-center lg:justify-end">
        <div class="float-animation w-72 h-72 sm:w-96 sm:h-96 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-3xl shadow-2xl flex items-center justify-center p-8">
          <svg class="w-full h-full" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 浏览器外框 -->
            <rect x="10" y="10" width="180" height="180" rx="30" fill="white" stroke="url(#frame-gradient)" stroke-width="4"/>
            <!-- 标题栏 -->
            <rect x="10" y="10" width="180" height="40" rx="26" fill="url(#title-gradient)"/>
            <!-- 标题栏按钮 -->
            <circle cx="30" cy="30" r="6" fill="#ef4444"/>
            <circle cx="50" cy="30" r="6" fill="#f59e0b"/>
            <circle cx="70" cy="30" r="6" fill="#10b981"/>
            <!-- 地址栏 -->
            <rect x="90" y="20" width="90" height="20" rx="10" fill="white" opacity="0.9"/>
            <!-- 内容区 -->
            <rect x="20" y="55" width="160" height="125" rx="20" fill="url(#content-gradient)"/>
            <!-- 内容区地球 -->
            <circle cx="100" cy="117.5" r="35" fill="#3b82f6"/>
            <path d="M65 117.5h70M100 82.5v70" stroke="white" stroke-width="2" opacity="0.3"/>
            <ellipse cx="100" cy="117.5" rx="35" ry="15" stroke="white" stroke-width="2" opacity="0.3"/>
            <ellipse cx="100" cy="117.5" rx="15" ry="35" stroke="white" stroke-width="2" opacity="0.3"/>
            <!-- 渐变定义 -->
            <defs>
              <linearGradient id="frame-gradient" x1="10" y1="10" x2="190" y2="190" gradientUnits="userSpaceOnUse">
                <stop stop-color="#3b82f6"/>
                <stop offset="1" stop-color="#1d4ed8"/>
              </linearGradient>
              <linearGradient id="title-gradient" x1="10" y1="10" x2="190" y2="50" gradientUnits="userSpaceOnUse">
                <stop stop-color="#f3f4f6"/>
                <stop offset="1" stop-color="#e5e7eb"/>
              </linearGradient>
              <linearGradient id="content-gradient" x1="20" y1="55" x2="180" y2="180" gradientUnits="userSpaceOnUse">
                <stop stop-color="#e0e7ff"/>
                <stop offset="1" stop-color="#c7d2fe"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
    </div>

    <!-- 系统要求区域 -->
    <section class="mt-20 sm:mt-32">
      <h2 class="text-2xl sm:text-3xl font-bold text-center mb-10 text-slate-800">系统要求</h2>
      <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-lg p-8">
        <ul class="space-y-4 text-slate-700">
          <li class="flex items-center gap-3">
            <svg class="w-6 h-6 text-blue-600 flex-shrink-0" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span><strong>操作系统：</strong>Windows 10 1809 及以上版本</span>
          </li>
          <li class="flex items-center gap-3">
            <svg class="w-6 h-6 text-blue-600 flex-shrink-0" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span><strong>内存：</strong>至少 2GB RAM（推荐 4GB 及以上）</span>
          </li>
          <li class="flex items-center gap-3">
            <svg class="w-6 h-6 text-blue-600 flex-shrink-0" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span><strong>磁盘空间：</strong>至少 50MB 可用空间</span>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="bg-white/80 backdrop-blur-md shadow-inner mt-20 sm:mt-32">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-slate-500 text-sm">
      <p>© 2026 Alittle Browser. All rights reserved.</p>
      <p class="mt-2">本软件仅供学习交流使用，请勿用于商业用途。</p>
    </div>
  </footer>
</body>
</html>
